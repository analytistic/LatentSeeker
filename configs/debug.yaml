output_dir: outputs/debug

# Data
data_path: data/debug/processed_debug
max_samples: 100
per_device_train_batch_size: 2
gradient_accumulation_steps: 2
dataloader_num_workers: 2
remove_unused_columns: false

# Schedule
num_train_epochs: 1
learning_rate: 1e-3
warmup_steps: 100
lr_scheduler_type: cosine
weight_decay: 0.01
max_grad_norm: 1.0

# Seed
seed: 42

# Logging & saving
logging_steps: 1
save_steps: 100
save_total_limit: 2

# Precision
bf16: true
report_to: none
deepspeed: deepspeed/zero1.json

# Freeze: train merger only (same as stage1)
freeze_modules:
  - model.language_model
  - model.longtext.embed_tokens
  - model.longtext.layers

# Compression
compress_stages:
  - [0, 1]
  - [0.1, 1.5]
  - [0.2, 2]
  - [0.5, 4]

# Model: tiny vocab, 3 layers, rest uses config.json defaults
model_config:
  text_config:
    vocab_size: 10
    num_hidden_layers: 3
  longtext_config:
    vocab_size: 10
    num_hidden_layers: 3
