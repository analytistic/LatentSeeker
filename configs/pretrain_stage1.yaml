output_dir: outputs/pretrain/stage1

# Data
data_path: data/wiki/processed_wiki
per_device_train_batch_size: 2
gradient_accumulation_steps: 32
dataloader_num_workers: 4
remove_unused_columns: false

# Schedule
num_train_epochs: 1
learning_rate: 1e-4
warmup_steps: 100
lr_scheduler_type: cosine
weight_decay: 0.01
max_grad_norm: 1.0

# Seed
seed: 42

# Logging & saving
logging_steps: 1
save_steps: 50
save_total_limit: 2

# Precision
bf16: true
report_to: tensorboard
deepspeed: deepspeed/zero2.json

# Freeze: LM + embed only, train layers + merger
freeze_modules:
  - model.language_model
  - model.longtext.embed_tokens

# Compression
compress_stages:
  - [0.0, 1.0]
  - [0.005, 1.1]
  - [0.01, 1.2]
  - [0.015, 1.3]
  - [0.02, 1.4]
